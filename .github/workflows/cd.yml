name: Publish Extension

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Check tag doesn't already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_VSCE_PAT: ${{ secrets.VSCE_PAT != '' }}
        run: |
          if [ "$HAS_VSCE_PAT" != "true" ]; then
            echo "::error::Missing required secret: VSCE_PAT — See docs/MARKETPLACE_SETUP.md"
            exit 1
          fi

      - name: Build .vsix
        run: npx vsce package --no-dependencies

      - name: Publish to VS Marketplace
        run: npx vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::OVSX_PAT not set, skipping Open VSX publish"
            exit 0
          fi
          npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-v${{ steps.version.outputs.version }}
          path: '*.vsix'
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## VS Code Extension Deployment

            - **Version:** ${{ steps.version.outputs.version }}
            - **VS Marketplace:** Published
            - **Open VSX:** Published
            - **Deployed by:** @${{ github.actor }}
          files: '*.vsix'
          generate_release_notes: true
